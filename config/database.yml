# DB 接続設定
# 値は環境変数から読み込む。デフォルト値は docker-compose.yml の設定に合わせてある。
# Docker を使わず rails server を直接起動する場合は .env を作成して環境変数をセットする。
default: &default
  adapter: mysql2
  encoding: utf8
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("DB_HOST",     "db") %>      # Docker内: db  /  直接起動: 127.0.0.1
  port:     <%= ENV.fetch("DB_PORT",     "3306") %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "sucseed_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "sucseed_test") %>

