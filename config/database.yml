# Docker環境・ローカル共通設定
# 接続情報はすべて環境変数(.env)から読み込む
# ローカル直接起動の場合は .env をプロジェクトルートに置くか
# direnv / dotenv 等で環境変数をセットすること
default: &default
  adapter: mysql2
  encoding: utf8
  # スレッドプール数（RAILS_MAX_THREADS が未設定なら 5）
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Dockerコンテナ内では DB_HOST=db（docker-compose のサービス名）
  # ローカル直接起動時は DB_HOST=127.0.0.1 を指定
  host:     <%= ENV.fetch("DB_HOST",     "db") %>
  port:     <%= ENV.fetch("DB_PORT",     "3306") %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "sucseed_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "sucseed_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "sucseed_production") %>
