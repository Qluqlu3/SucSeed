# ローカル開発用 docker-compose.yml
#
# よく使うコマンド:
#   docker compose up --build   # 初回・Gemfile 変更後はこちら
#   docker compose up           # 2回目以降
#   docker compose down         # 停止
#   docker compose down -v      # DB データも含めて全リセット
#   docker compose run --rm web rails db:create db:migrate
#   docker compose run --rm web rails console

services:

  # ── MySQL 8.0 ────────────────────────────────────────────
  db:
    image: mysql:8.0
    # mysql2 gem との互換性のため旧認証プラグインを使用
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password   # ローカル開発用のパスワード（固定で問題ない）
      MYSQL_DATABASE: sucseed_development
    ports:
      - "3306:3306"   # TablePlus / DBeaver 等のGUIツールで直接つなぎたい場合に便利
    volumes:
      - db_data:/var/lib/mysql   # コンテナを削除してもDBデータが消えないように永続化
    healthcheck:
      # Rails より先に MySQL が起動完了するまで待つ
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Rails アプリ ─────────────────────────────────────────
  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    environment:
      DB_HOST:        db            # docker-compose のサービス名がそのままホスト名になる
      DB_PORT:        3306
      DB_USERNAME:    root
      DB_PASSWORD:    password
      DB_NAME:        sucseed_development
      RAILS_ENV:      development
      SECRET_KEY_BASE: devsecret_local_only   # ローカル限定なので固定値で OK
    ports:
      - "3000:3000"   # localhost:3000 でブラウザからアクセス
    volumes:
      - .:/app                            # ホストのコードをマウント → コード変更が即反映
      - bundle_cache:/usr/local/bundle    # gem をボリュームに逃がしてマウントで消えないようにする
      - uploads:/app/public/uploads       # CarrierWave の画像アップロード先を永続化
    depends_on:
      db:
        condition: service_healthy   # MySQL が Ready になってから Rails を起動
    stdin_open: true   # byebug / binding.pry をコンテナ内で使えるようにする
    tty: true

  # ── esbuild watch ──────────────────────────────────────
  # JS/TSX ファイルの変更を監視して自動的に app/assets/builds/ へ再バンドル
  # web サービスと同じコードを共有しているため同じイメージ・ボリュームを使う
  #
  # 【仕組み】
  #   1. app/javascript/ 以下のファイルを変更する
  #   2. esbuild が検知して app/assets/builds/application.js を再生成
  #   3. ブラウザをリロードすると最新の JS が読み込まれる
  #
  # 【モノレポ移行時】
  #   このサービスを削除し、代わりに frontend/ サービスとして
  #   Vite dev server を起動する docker-compose サービスを追加する
  js:
    build: .
    command: yarn build:watch
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development

# 名前付きボリュームの定義（docker が自動で作成・管理する）
volumes:
  db_data:
  bundle_cache:
  uploads:

# ── デプロイ時のメモ（今は使わない）────────────────────────
# 本番環境にデプロイする場合は以下を検討:
#   - SECRET_KEY_BASE を `rails secret` で生成した値に変更
#   - DB_PASSWORD を強力なランダム値に変更
#   - RAILS_ENV: production に変更
#   - nginx などのリバースプロキシを web の前段に追加
# ──────────────────────────────────────────────────────────
