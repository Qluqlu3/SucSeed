# ローカル開発用 docker-compose.yml
#
# よく使うコマンド:
#   docker compose up --build   # 初回・Gemfile / package.json 変更後はこちら
#   docker compose up           # 2回目以降
#   docker compose down         # 停止
#   docker compose down -v      # DB データも含めて全リセット
#   docker compose run --rm web rails db:create db:migrate
#   docker compose run --rm web rails console

services:

  # ── MySQL 8.0 ────────────────────────────────────────────
  db:
    image: mysql:8.0
    # mysql2 gem との互換性のため旧認証プラグインを使用
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password   # ローカル開発用のパスワード（固定で問題ない）
      MYSQL_DATABASE: sucseed_development
    ports:
      - "3306:3306"   # TablePlus / DBeaver 等のGUIツールで直接つなぎたい場合に便利
    volumes:
      - db_data:/var/lib/mysql   # コンテナを削除してもDBデータが消えないように永続化
    healthcheck:
      # Rails より先に MySQL が起動完了するまで待つ
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Rails アプリ ─────────────────────────────────────────
  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    environment:
      DB_HOST:        db            # docker-compose のサービス名がそのままホスト名になる
      DB_PORT:        3306
      DB_USERNAME:    root
      DB_PASSWORD:    password
      DB_NAME:        sucseed_development
      RAILS_ENV:      development
      SECRET_KEY_BASE: devsecret_local_only   # ローカル限定なので固定値で OK
      SENTRY_DSN:     ''            # 本番では Sentry DSN を設定する（空なら無効）
    ports:
      - "3000:3000"   # localhost:3000 でブラウザからアクセス
    volumes:
      - .:/app                            # ホストのコードをマウント → コード変更が即反映
      - bundle_cache:/usr/local/bundle    # gem をボリュームに逃がしてマウントで消えないようにする
      - node_modules:/app/node_modules    # macOS バイナリが混入しないよう Linux 用を分離
      - uploads:/app/public/uploads       # CarrierWave の画像アップロード先を永続化
    depends_on:
      db:
        condition: service_healthy   # MySQL が Ready になってから Rails を起動
    stdin_open: true   # byebug / binding.pry をコンテナ内で使えるようにする
    tty: true

  # ── esbuild watch（JS/TSX）──────────────────────────────
  # frontend/ 以下の JS/TSX ファイルを監視して app/assets/builds/application.js へ再バンドル
  # pnpm install を毎回実行することで Linux 用バイナリが確実に揃う
  js:
    build: .
    command: sh -c "pnpm install --frozen-lockfile && pnpm run build:watch"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules    # web / css サービスと共有
      - pnpm_store:/root/.local/share/pnpm/store   # ダウンロード済みパッケージをキャッシュ
    environment:
      RAILS_ENV: development

  # ── Tailwind CSS watch（CSS）────────────────────────────
  # frontend/styles/tailwind.css を監視して app/assets/builds/tailwind.css を再生成
  # ERB・TSX に書いた Tailwind クラスのツリーシェイキングもここで行われる
  css:
    build: .
    command: sh -c "pnpm install --frozen-lockfile && pnpm run build:css:watch"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      RAILS_ENV: development
    stdin_open: true
    tty: true

# 名前付きボリュームの定義（docker が自動で作成・管理する）
volumes:
  db_data:
  bundle_cache:
  node_modules:    # コンテナ用 node_modules（ホストの macOS バイナリと分離）
  pnpm_store:      # pnpm のパッケージダウンロードキャッシュ（再起動時の高速化）
  uploads:

# ── デプロイ時のメモ（今は使わない）────────────────────────
# 本番環境にデプロイする場合は以下を検討:
#   - SECRET_KEY_BASE を `rails secret` で生成した値に変更
#   - DB_PASSWORD を強力なランダム値に変更
#   - RAILS_ENV: production に変更
#   - nginx などのリバースプロキシを web の前段に追加
# ──────────────────────────────────────────────────────────
